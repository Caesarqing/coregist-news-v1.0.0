services:
  mongodb:
    image: mongo:7
    container_name: coregist-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-example}

  redis:
    image: redis:7-alpine
    container_name: coregist-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: coregist-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      - user-service
      - news-service
      - search-service
      - agent-config-service
      - skill-config-service
    environment:
      PORT: 3000
      ACCESS_TOKEN_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      USER_SERVICE_URL: http://user-service:3001
      NEWS_SERVICE_URL: http://news-service:3002
      SEARCH_SERVICE_URL: http://search-service:3005
      AGENT_CONFIG_SERVICE_URL: http://agent-config-service:3003
      SKILL_CONFIG_SERVICE_URL: http://skill-config-service:3004
    ports:
      - "3000:3000"

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      PORT: 3001
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://root:example@mongodb:27017/coregistnews?authSource=admin}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-coregistnews-news}
      ACCESS_TOKEN_EXPIRES_SECONDS: ${ACCESS_TOKEN_EXPIRES_SECONDS:-604800}
      REFRESH_TOKEN_EXPIRES_SECONDS: ${REFRESH_TOKEN_EXPIRES_SECONDS:-2592000}
      RESET_CODE_EXPIRES_MINUTES: ${RESET_CODE_EXPIRES_MINUTES:-10}

  news-service:
    build:
      context: .
      dockerfile: services/news-service/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      PORT: 3002
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://root:example@mongodb:27017/coregistnews?authSource=admin}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-coregistnews-news}

  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
    environment:
      PORT: 3005
      SEARCH_SERVICE_PORT: 3005
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://root:example@mongodb:27017/coregistnews?authSource=admin}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-coregistnews-news}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

  news-rss-worker:
    build:
      context: .
      dockerfile: services/news_scraper/Dockerfile
    restart: unless-stopped
    command: ["python", "services/news_scraper/app.py", "--worker-mode", "rss"]
    depends_on:
      - rabbitmq
      - mongodb
    environment:
      PYTHONUNBUFFERED: "1"
      NEWS_SCRAPER_WORKER_MODE: rss
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://root:example@mongodb:27017/coregistnews?authSource=admin}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-coregistnews}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      SEARCH_DEFAULT_QUERY: ${SEARCH_DEFAULT_QUERY:-AI Agent 最新进展}
      RSS_MAX_ITEMS_PER_FEED: ${RSS_MAX_ITEMS_PER_FEED:-20}
      RSS_MAX_ITEMS_PER_FEED_HARD_LIMIT: ${RSS_MAX_ITEMS_PER_FEED_HARD_LIMIT:-50}
      RSS_VERIFY_SSL: ${RSS_VERIFY_SSL:-true}
      RSS_ALLOW_INSECURE_HOSTS: ${RSS_ALLOW_INSECURE_HOSTS:-}
      RSS_REQUEST_TIMEOUT_SECONDS: ${RSS_REQUEST_TIMEOUT_SECONDS:-10}
      RSS_FEED_TIMEOUT_MS: ${RSS_FEED_TIMEOUT_MS:-8000}
      RSS_BROWSER_TIMEOUT_MS: ${RSS_BROWSER_TIMEOUT_MS:-12000}
      RSS_TIMEOUT_BACKOFF_SECONDS: ${RSS_TIMEOUT_BACKOFF_SECONDS:-1800}
      RSS_BROWSER_TIMEOUT_BACKOFF_SECONDS: ${RSS_BROWSER_TIMEOUT_BACKOFF_SECONDS:-3600}
      RSS_HTTP_LIMITED_BACKOFF_SECONDS: ${RSS_HTTP_LIMITED_BACKOFF_SECONDS:-21600}
      RSS_TIMEOUT_QUARANTINE_THRESHOLD: ${RSS_TIMEOUT_QUARANTINE_THRESHOLD:-5}
      RSS_HTTP_LIMITED_QUARANTINE_THRESHOLD: ${RSS_HTTP_LIMITED_QUARANTINE_THRESHOLD:-3}
      RSS_TIMEOUT_QUARANTINE_SECONDS: ${RSS_TIMEOUT_QUARANTINE_SECONDS:-21600}
      RSS_HTTP_LIMITED_QUARANTINE_SECONDS: ${RSS_HTTP_LIMITED_QUARANTINE_SECONDS:-86400}
      RSS_QUARANTINE_REPEATS_TO_DISABLE: ${RSS_QUARANTINE_REPEATS_TO_DISABLE:-3}
      RSS_DISABLE_AFTER_FAILURES: ${RSS_DISABLE_AFTER_FAILURES:-12}

  news-keyword-worker:
    build:
      context: .
      dockerfile: services/news_scraper/Dockerfile
    restart: unless-stopped
    command: ["python", "services/news_scraper/app.py", "--worker-mode", "keyword"]
    depends_on:
      - rabbitmq
      - mongodb
    environment:
      PYTHONUNBUFFERED: "1"
      NEWS_SCRAPER_WORKER_MODE: keyword
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://root:example@mongodb:27017/coregistnews?authSource=admin}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-coregistnews}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      SEARCH_DEFAULT_QUERY: ${SEARCH_DEFAULT_QUERY:-AI Agent 最新进展}
      PUSH_MAX_ENRICHMENT_PER_BATCH: ${PUSH_MAX_ENRICHMENT_PER_BATCH:-20}
      RSS_VERIFY_SSL: ${RSS_VERIFY_SSL:-true}
      RSS_ALLOW_INSECURE_HOSTS: ${RSS_ALLOW_INSECURE_HOSTS:-}
      RSS_REQUEST_TIMEOUT_SECONDS: ${RSS_REQUEST_TIMEOUT_SECONDS:-10}
      RSS_FEED_TIMEOUT_MS: ${RSS_FEED_TIMEOUT_MS:-8000}
      RSS_BROWSER_TIMEOUT_MS: ${RSS_BROWSER_TIMEOUT_MS:-12000}

  content-processing-service:
    build:
      context: .
      dockerfile: services/content_processing/Dockerfile
    restart: unless-stopped
    depends_on:
      - rabbitmq
    environment:
      PYTHONUNBUFFERED: "1"
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://root:example@mongodb:27017/coregistnews?authSource=admin}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-coregistnews}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai-compatible}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_JSON_MODE: ${LLM_JSON_MODE:-true}
      LLM_HTTP_REFERER: ${LLM_HTTP_REFERER:-}
      LLM_TITLE: ${LLM_TITLE:-CoreGist News}
      LLM_TOKEN_FIELD: ${LLM_TOKEN_FIELD:-max_tokens}
      LLM_TOP_P: ${LLM_TOP_P:-}
      LLM_FREQUENCY_PENALTY: ${LLM_FREQUENCY_PENALTY:-}
      LLM_PRESENCE_PENALTY: ${LLM_PRESENCE_PENALTY:-}
      LLM_SYSTEM_PROMPT: ${LLM_SYSTEM_PROMPT:-}
      LLM_EXTRA_BODY_JSON: ${LLM_EXTRA_BODY_JSON:-}
      ANTHROPIC_VERSION: ${ANTHROPIC_VERSION:-2023-06-01}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      AI_CONTENT_MODEL: ${AI_CONTENT_MODEL:-${LLM_PROVIDER:-openai-compatible}}
      AI_CONTENT_LLM_MODEL: ${AI_CONTENT_LLM_MODEL:-}
      AI_CONTENT_BASE_URL: ${AI_CONTENT_BASE_URL:-}
      AI_CONTENT_API_KEY: ${AI_CONTENT_API_KEY:-}
      AI_CONTENT_MAX_TOKENS: ${AI_CONTENT_MAX_TOKENS:-900}
      AI_CONTENT_CHAR_LIMIT: ${AI_CONTENT_CHAR_LIMIT:-4500}
      AI_CONTENT_JSON_MODE: ${AI_CONTENT_JSON_MODE:-${LLM_JSON_MODE:-true}}
      AI_REVIEW_MODEL: ${AI_REVIEW_MODEL:-${LLM_PROVIDER:-openai-compatible}}
      AI_REVIEW_LLM_MODEL: ${AI_REVIEW_LLM_MODEL:-}
      AI_REVIEW_BASE_URL: ${AI_REVIEW_BASE_URL:-}
      AI_REVIEW_API_KEY: ${AI_REVIEW_API_KEY:-}
      AI_REVIEW_MAX_TOKENS: ${AI_REVIEW_MAX_TOKENS:-1200}
      AI_REVIEW_CHAR_LIMIT: ${AI_REVIEW_CHAR_LIMIT:-3500}
      AI_REVIEW_JSON_MODE: ${AI_REVIEW_JSON_MODE:-${LLM_JSON_MODE:-true}}

  ai-analysis-service:
    build:
      context: .
      dockerfile: services/ai_analysis/Dockerfile
    restart: unless-stopped
    depends_on:
      - rabbitmq
      - mongodb
    environment:
      PYTHONUNBUFFERED: "1"
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://root:example@mongodb:27017/coregistnews?authSource=admin}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-coregistnews}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai-compatible}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_JSON_MODE: ${LLM_JSON_MODE:-true}
      LLM_HTTP_REFERER: ${LLM_HTTP_REFERER:-}
      LLM_TITLE: ${LLM_TITLE:-CoreGist News}
      LLM_TOKEN_FIELD: ${LLM_TOKEN_FIELD:-max_tokens}
      LLM_TOP_P: ${LLM_TOP_P:-}
      LLM_FREQUENCY_PENALTY: ${LLM_FREQUENCY_PENALTY:-}
      LLM_PRESENCE_PENALTY: ${LLM_PRESENCE_PENALTY:-}
      LLM_SYSTEM_PROMPT: ${LLM_SYSTEM_PROMPT:-}
      LLM_EXTRA_BODY_JSON: ${LLM_EXTRA_BODY_JSON:-}
      ANTHROPIC_VERSION: ${ANTHROPIC_VERSION:-2023-06-01}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      AI_CONTENT_MODEL: ${AI_CONTENT_MODEL:-${LLM_PROVIDER:-openai-compatible}}
      AI_CONTENT_LLM_MODEL: ${AI_CONTENT_LLM_MODEL:-}
      AI_CONTENT_BASE_URL: ${AI_CONTENT_BASE_URL:-}
      AI_CONTENT_API_KEY: ${AI_CONTENT_API_KEY:-}
      AI_CONTENT_MAX_TOKENS: ${AI_CONTENT_MAX_TOKENS:-900}
      AI_CONTENT_CHAR_LIMIT: ${AI_CONTENT_CHAR_LIMIT:-4500}
      AI_CONTENT_JSON_MODE: ${AI_CONTENT_JSON_MODE:-${LLM_JSON_MODE:-true}}
      AI_REVIEW_MODEL: ${AI_REVIEW_MODEL:-${LLM_PROVIDER:-openai-compatible}}
      AI_REVIEW_LLM_MODEL: ${AI_REVIEW_LLM_MODEL:-}
      AI_REVIEW_BASE_URL: ${AI_REVIEW_BASE_URL:-}
      AI_REVIEW_API_KEY: ${AI_REVIEW_API_KEY:-}
      AI_REVIEW_MAX_TOKENS: ${AI_REVIEW_MAX_TOKENS:-1200}
      AI_REVIEW_CHAR_LIMIT: ${AI_REVIEW_CHAR_LIMIT:-3500}
      AI_REVIEW_JSON_MODE: ${AI_REVIEW_JSON_MODE:-${LLM_JSON_MODE:-true}}

  scheduler-service:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    restart: unless-stopped
    depends_on:
      - rabbitmq
      - mongodb
    environment:
      PYTHONUNBUFFERED: "1"
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://root:example@mongodb:27017/coregistnews?authSource=admin}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-coregistnews}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      SCHEDULER_DEFAULT_QUERY: ${SEARCH_DEFAULT_QUERY:-AI Agent 最新进展}
      SCHEDULER_INTERVAL_MINUTES: ${SCHEDULER_INTERVAL_MINUTES:-30}
      RSS_MAX_ITEMS_PER_FEED: ${RSS_MAX_ITEMS_PER_FEED:-20}
      RSS_MAX_ITEMS_PER_FEED_HARD_LIMIT: ${RSS_MAX_ITEMS_PER_FEED_HARD_LIMIT:-50}
      RSS_SOURCE_BATCH_SIZE: ${RSS_SOURCE_BATCH_SIZE:-8}
      PUSH_TIMEZONE: ${PUSH_TIMEZONE:-Asia/Shanghai}
      PUSH_DUE_WINDOW_MINUTES: ${PUSH_DUE_WINDOW_MINUTES:-5}
      PUSH_EXISTING_NEWS_LOOKBACK_HOURS: ${PUSH_EXISTING_NEWS_LOOKBACK_HOURS:-72}
      PUSH_BATCH_COMPLETION_TIMEOUT_MINUTES: ${PUSH_BATCH_COMPLETION_TIMEOUT_MINUTES:-30}
      PUSH_MAX_ENRICHMENT_PER_BATCH: ${PUSH_MAX_ENRICHMENT_PER_BATCH:-20}

  notification-service:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    restart: unless-stopped
    depends_on:
      - rabbitmq
      - mongodb
    environment:
      PYTHONUNBUFFERED: "1"
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://root:example@mongodb:27017/coregistnews?authSource=admin}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-coregistnews}

  agent-config-service:
    build:
      context: .
      dockerfile: services/agent_config/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      PYTHONUNBUFFERED: "1"
      AGENT_CONFIG_PORT: 3003
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://root:example@mongodb:27017/coregistnews?authSource=admin}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-coregistnews}

  skill-config-service:
    build:
      context: .
      dockerfile: services/skill_config/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      PYTHONUNBUFFERED: "1"
      SKILL_CONFIG_PORT: 3004
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://root:example@mongodb:27017/coregistnews?authSource=admin}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-coregistnews}

volumes:
  mongodb_data:
